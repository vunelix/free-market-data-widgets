<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vunelix Fund Screener Widget — Live Demo</title>
    <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body data-page-theme="light">

    <div class="header">
        <h1>Fund Screener</h1>
        <p>Advanced ETF and mutual fund screener with filters, custom tabs, and real-time data. Switch themes to see how the widget adapts automatically.</p>

        <div class="theme-bar">
            <button class="theme-btn active" data-set-theme="light">Light</button>
            <button class="theme-btn" data-set-theme="dark">Dark</button>
        </div>
    </div>

    <!-- 1. Default -->
    <div class="widget-section">
        <div class="widget-label">Default — Overview</div>
        <div class="widget-frame">
            <vunelix-fund-screener></vunelix-fund-screener>
        </div>
    </div>

    <!-- 2. Dividends Tab, Filters, Cyan theme -->
    <div class="widget-section">
        <div class="widget-label">Dividends — With Filters</div>
        <div class="widget-frame">
            <vunelix-fund-screener
                data-default-preset="dividends"
                data-per-page="50"
                data-default-sort="earnings.market_cap_desc"
                data-default-period="1m"
                data-animation-mode="digits"
                data-animation-duration="1000"
                data-positive-color="#0891b2,#22d3ee"
                data-negative-color="#dc2626,#f87171"
                data-bg-color="#ecfeff,#0a1518"
                data-text-color="#164e63,#cffafe"
                data-text-secondary-color="#06b6d4,#67e8f9"
                data-border-color="#a5f3fc,#1a3540">
            </vunelix-fund-screener>
        </div>
    </div>

    <!-- 3. Custom Tabs, Forest Green theme -->
    <div class="widget-section">
        <div class="widget-label">Custom Tabs</div>
        <div class="widget-frame">
            <vunelix-fund-screener
                data-custom-presets='{"Returns":["price","change-percent","weekly-perf","monthly-perf","ytd-perf"],"Dividends":["price","dps-fy","dividend-yield-current","dividend-yield-fy"]}'
                data-enable-filter="false"
                data-enable-fav="false"
                data-enable-color-groups="false"
                data-show-description="false"
                data-animation-mode="full"
                data-animation-duration="1500"
                data-positive-color="#15803d,#4ade80"
                data-negative-color="#b91c1c,#fca5a5"
                data-bg-color="#f0fdf4,#0a160e"
                data-text-color="#14532d,#bbf7d0"
                data-text-secondary-color="#16a34a,#86efac"
                data-border-color="#bbf7d0,#1a3a24">
            </vunelix-fund-screener>
        </div>
    </div>

    <!-- 4. Minimal, Amber theme -->
    <div class="widget-section">
        <div class="widget-label">Minimal — No Controls</div>
        <div class="widget-frame">
            <vunelix-fund-screener
                data-enable-presets="false"
                data-enable-period="false"
                data-enable-search="false"
                data-enable-settings="false"
                data-enable-columns="false"
                data-enable-filter="false"
                data-enable-fav="false"
                data-show-logo="false"
                data-show-ticker="false"
                data-enable-sort="false"
                data-enable-infinite-scroll="true"
                data-per-page="50"
                data-animation-mode="none"
                data-positive-color="#b45309,#fbbf24"
                data-negative-color="#9f1239,#fda4af"
                data-bg-color="#fffbeb,#1a1408"
                data-text-color="#78350f,#fde68a"
                data-text-secondary-color="#b45309,#f59e0b"
                data-border-color="#fde68a,#4a3820">
            </vunelix-fund-screener>
        </div>
    </div>

    <div class="footer">
        <a href="https://vunelix.com/widgets/fund-screener" target="_blank">Documentation</a> &middot;
        <a href="https://vunelix.com" target="_blank">Vunelix</a>
    </div>

    <script src="https://vunelix.com/assets/bundles/js/widgets/screener/vunelix-fund-screener.js" type="module"></script>
    <script src="../assets/js/demo.js"></script>
</body>
</html>
