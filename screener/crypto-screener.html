<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vunelix Crypto Screener Widget — Live Demo</title>
    <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body data-page-theme="light">

    <div class="header">
        <h1>Crypto Screener</h1>
        <p>Advanced cryptocurrency screener with filters, custom tabs, and real-time data. Switch themes to see how the widget adapts automatically.</p>

        <div class="theme-bar">
            <button class="theme-btn active" data-set-theme="light">Light</button>
            <button class="theme-btn" data-set-theme="dark">Dark</button>
        </div>
    </div>

    <!-- 1. Default -->
    <div class="widget-section">
        <div class="widget-label">Default — Overview</div>
        <div class="widget-frame">
            <vunelix-crypto-screener></vunelix-crypto-screener>
        </div>
    </div>

    <!-- 2. Performance Tab, Pre-applied Filters, Teal theme -->
    <div class="widget-section">
        <div class="widget-label">Performance Tab — With Filters</div>
        <div class="widget-frame">
            <vunelix-crypto-screener
                data-default-preset="performance"
                data-default-period="1w"
                data-per-page="50"
                data-default-filters='{"perf.market_cap_gt":"1000000000"}'
                data-default-sort="perf.24h_vol_cmc_desc"
                data-animation-mode="full"
                data-enable-storage="true"
                data-positive-color="#0d9488,#2dd4bf"
                data-negative-color="#e11d48,#fb7185"
                data-bg-color="#f0fdfa,#0a1a1a"
                data-text-color="#134e4a,#ccfbf1"
                data-text-secondary-color="#0d9488,#5eead4"
                data-border-color="#99f6e4,#1a3a3a">
            </vunelix-crypto-screener>
        </div>
    </div>

    <!-- 3. Custom Tabs, No Filters, Purple theme -->
    <div class="widget-section">
        <div class="widget-label">Custom Tabs — No Filters</div>
        <div class="widget-frame">
            <vunelix-crypto-screener
                data-custom-presets='{"Price & Volume":["price","change","change-percent","24h-vol-cmc"],"Market Cap":["price","market-cap","rank","circulating-supply"]}'
                data-enable-filter="false"
                data-enable-fav="false"
                data-enable-color-groups="false"
                data-show-currency="false"
                data-show-description="false"
                data-animation-mode="flash"
                data-animation-duration="2000"
                data-positive-color="#7c3aed,#a78bfa"
                data-negative-color="#d97706,#fbbf24"
                data-bg-color="#faf5ff,#110e1a"
                data-bg-secondary-color="#f3e8ff,#1e1530"
                data-text-color="#4c1d95,#e9d5ff"
                data-text-secondary-color="#7c3aed,#a78bfa"
                data-border-color="#ddd6fe,#3b2d5e">
            </vunelix-crypto-screener>
        </div>
    </div>

    <!-- 4. Minimal, Infinite Scroll, Ocean Blue theme -->
    <div class="widget-section">
        <div class="widget-label">Minimal — Infinite Scroll</div>
        <div class="widget-frame">
            <vunelix-crypto-screener
                data-enable-presets="false"
                data-enable-period="false"
                data-enable-search="false"
                data-enable-settings="false"
                data-enable-columns="false"
                data-enable-filter="false"
                data-enable-fav="false"
                data-enable-infinite-scroll="true"
                data-enable-sort="false"
                data-show-logo="false"
                data-show-ticker="false"
                data-per-page="50"
                data-animation-mode="none"
                data-positive-color="#0284c7,#38bdf8"
                data-negative-color="#be123c,#fda4af"
                data-bg-color="#f0f9ff,#0c1222"
                data-text-color="#0c4a6e,#e0f2fe"
                data-text-secondary-color="#0369a1,#7dd3fc"
                data-border-color="#bae6fd,#1e3a5f">
            </vunelix-crypto-screener>
        </div>
    </div>

    <div class="footer">
        <a href="https://vunelix.com/widgets/crypto-screener" target="_blank">Documentation</a> &middot;
        <a href="https://vunelix.com" target="_blank">Vunelix</a>
    </div>

    <script src="https://vunelix.com/assets/bundles/js/widgets/screener/vunelix-crypto-screener.js" type="module"></script>
    <script src="../assets/js/demo.js"></script>
</body>
</html>
