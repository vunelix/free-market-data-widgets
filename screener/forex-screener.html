<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vunelix Forex Screener Widget — Live Demo</title>
    <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body data-page-theme="light">

    <div class="header">
        <h1>Forex Screener</h1>
        <p>Advanced forex screener with filters, custom tabs, and real-time data. Switch themes to see how the widget adapts automatically.</p>

        <div class="theme-bar">
            <button class="theme-btn active" data-set-theme="light">Light</button>
            <button class="theme-btn" data-set-theme="dark">Dark</button>
        </div>
    </div>

    <!-- 1. Default -->
    <div class="widget-section">
        <div class="widget-label">Default — Overview</div>
        <div class="widget-frame">
            <vunelix-forex-screener></vunelix-forex-screener>
        </div>
    </div>

    <!-- 2. Oscillators Tab, Filters, Emerald theme -->
    <div class="widget-section">
        <div class="widget-label">Oscillators — With Filters</div>
        <div class="widget-frame">
            <vunelix-forex-screener
                data-default-preset="oscillators"
                data-per-page="50"
                data-default-filters='{"active.chp_gt":"0.5"}'
                data-default-period="1d"
                data-animation-mode="full"
                data-animation-duration="1500"
                data-enable-storage="true"
                data-positive-color="#059669,#34d399"
                data-negative-color="#e11d48,#fb7185"
                data-bg-color="#ecfdf5,#0a1a14"
                data-text-color="#064e3b,#a7f3d0"
                data-text-secondary-color="#10b981,#6ee7b7"
                data-border-color="#a7f3d0,#1a3a24">
            </vunelix-forex-screener>
        </div>
    </div>

    <!-- 3. Custom Tabs, Purple theme -->
    <div class="widget-section">
        <div class="widget-label">Custom Tabs</div>
        <div class="widget-frame">
            <vunelix-forex-screener
                data-custom-presets='{"Spread & Volume":["price","ask","bid","volume","daily-volatility"],"Bid/Ask":["price","ask","bid","change","change-percent"]}'
                data-enable-filter="false"
                data-enable-fav="false"
                data-enable-color-groups="false"
                data-show-description="false"
                data-animation-mode="flash"
                data-animation-duration="2000"
                data-positive-color="#7c3aed,#a78bfa"
                data-negative-color="#d97706,#fbbf24"
                data-bg-color="#faf5ff,#110e1a"
                data-text-color="#4c1d95,#e9d5ff"
                data-text-secondary-color="#7c3aed,#a78bfa"
                data-border-color="#ddd6fe,#3b2d5e">
            </vunelix-forex-screener>
        </div>
    </div>

    <!-- 4. Minimal, Ocean Blue theme -->
    <div class="widget-section">
        <div class="widget-label">Minimal — Infinite Scroll</div>
        <div class="widget-frame">
            <vunelix-forex-screener
                data-enable-presets="false"
                data-enable-period="false"
                data-enable-search="false"
                data-enable-settings="false"
                data-enable-columns="false"
                data-enable-filter="false"
                data-enable-fav="false"
                data-enable-infinite-scroll="true"
                data-enable-sort="false"
                data-show-logo="false"
                data-show-ticker="false"
                data-per-page="50"
                data-animation-mode="none"
                data-positive-color="#0284c7,#38bdf8"
                data-negative-color="#be123c,#fda4af"
                data-bg-color="#f0f9ff,#0c1222"
                data-text-color="#0c4a6e,#e0f2fe"
                data-text-secondary-color="#0369a1,#7dd3fc"
                data-border-color="#bae6fd,#1e3a5f">
            </vunelix-forex-screener>
        </div>
    </div>

    <div class="footer">
        <a href="https://vunelix.com/widgets/forex-screener" target="_blank">Documentation</a> &middot;
        <a href="https://vunelix.com" target="_blank">Vunelix</a>
    </div>

    <script src="https://vunelix.com/assets/bundles/js/widgets/screener/vunelix-forex-screener.js" type="module"></script>
    <script src="../assets/js/demo.js"></script>
</body>
</html>
