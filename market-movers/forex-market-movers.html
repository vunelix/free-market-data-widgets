<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vunelix Forex Market Movers Widget — Live Demo</title>
    <link rel="stylesheet" href="../assets/css/demo.css">
</head>
<body data-page-theme="light">

    <div class="header">
        <h1>Forex Market Movers</h1>
        <p>Real-time top gainers and losers in forex. Switch themes to see how the widget adapts automatically.</p>

        <div class="theme-bar">
            <button class="theme-btn active" data-set-theme="light">Light</button>
            <button class="theme-btn" data-set-theme="dark">Dark</button>
        </div>
    </div>

    <!-- 1. Default — Clean -->
    <div class="widget-section">
        <div class="widget-label">Default — Top Gainers</div>
        <div class="widget-frame">
            <vunelix-forex-market-movers></vunelix-forex-market-movers>
        </div>
    </div>

    <!-- 2. Losers, Badge, Bordered, Emerald/Rose theme -->
    <div class="widget-section">
        <div class="widget-label">Top Losers — Badge Style, Bordered</div>
        <div class="widget-frame">
            <vunelix-forex-market-movers
                data-sort-by="active.chp_asc"
                data-change-badge="true"
                data-card-style="bordered"
                data-per-page="8"
                data-show-currency="false"
                data-positive-color="#059669,#34d399"
                data-negative-color="#e11d48,#fb7185"
                data-bg-color="#ecfdf5,#0a1a14"
                data-text-color="#064e3b,#a7f3d0"
                data-text-secondary-color="#10b981,#6ee7b7">
            </vunelix-forex-market-movers>
        </div>
    </div>

    <!-- 3. Volume, Ask/Bid, 1 Cols, Indigo/Slate theme -->
    <div class="widget-section">
        <div class="widget-label">Volume Sort — Ask/Bid Metrics, 1 Columns</div>
        <div class="widget-frame">
            <vunelix-forex-market-movers
                data-sort-by="active.v_desc"
                data-metrics="active.a,active.b"
                data-grid-cols="1"
                data-per-page="8"
                data-card-style="borderless"
                data-positive-color="#4f46e5,#818cf8"
                data-negative-color="#dc2626,#f87171"
                data-bg-color="#eef2ff,#0f1120"
                data-bg-secondary-color="#e0e7ff,#1a1e36"
                data-text-color="#312e81,#c7d2fe"
                data-text-secondary-color="#6366f1,#a5b4fc"
                data-border-color="#c7d2fe,#2e3460">
            </vunelix-forex-market-movers>
        </div>
    </div>

    <!-- 4. Price High→Low, No Currency, Warm Amber theme -->
    <div class="widget-section">
        <div class="widget-label">Price High→Low — No Currency Label</div>
        <div class="widget-frame">
            <vunelix-forex-market-movers
                data-sort-by="active.c_desc"
                data-show-currency="false"
                data-per-page="6"
                data-card-style="bordered"
                data-show-border="true"
                data-positive-color="#b45309,#fbbf24"
                data-negative-color="#9f1239,#fda4af"
                data-bg-color="#fffbeb,#1a1408"
                data-bg-secondary-color="#fef3c7,#2a2010"
                data-text-color="#78350f,#fde68a"
                data-text-secondary-color="#b45309,#f59e0b"
                data-border-color="#fde68a,#4a3820">
            </vunelix-forex-market-movers>
        </div>
    </div>

    <div class="footer">
        <a href="https://vunelix.com/widgets/forex-market-movers" target="_blank">Documentation</a> &middot;
        <a href="https://vunelix.com" target="_blank">Vunelix</a>
    </div>

    <script src="https://vunelix.com/assets/bundles/js/widgets/market-movers/vunelix-forex-market-movers.js" type="module"></script>
    <script src="../assets/js/demo.js"></script>
</body>
</html>
